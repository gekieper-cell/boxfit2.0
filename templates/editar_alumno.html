{% extends "base.html" %}
{% block title %}Editar Alumno{% endblock %}

{% block content %}
<div class="mb-5"><h2 class="text-xl font-semibold dark:text-white">Editar Alumno</h2><p class="text-gray-500 text-sm">Modificar datos del alumno</p></div>

<div class="card max-w-2xl">
    <div class="card-body">
        <form method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group"><label class="form-label">Nombre completo *</label><input type="text" name="nombre" value="{{ alumno.nombre }}" required class="form-control"></div>
                <div class="form-group"><label class="form-label">DNI *</label><input type="text" name="dni" value="{{ alumno.dni }}" required class="form-control"></div>
                <div class="form-group"><label class="form-label">Teléfono</label><input type="text" name="telefono" value="{{ alumno.telefono or '' }}" class="form-control"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" value="{{ alumno.email or '' }}" class="form-control"></div>
                <div class="form-group"><label class="form-label">Clase</label><select name="clase" class="form-control"><option value="">Seleccionar</option>{% for c in ['Boxeo Principiantes','Boxeo Intermedio','Boxeo Avanzado','Funcional','Sparring'] %}<option value="{{ c }}" {% if alumno.clase == c %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></div>
                <div class="form-group"><label class="form-label">Horario</label><select name="horario" class="form-control"><option value="">Seleccionar</option>{% for h in ['08:00-09:00','09:00-10:00','10:00-11:00','17:00-18:00','18:00-19:00','19:00-20:00','20:00-21:00'] %}<option value="{{ h }}" {% if alumno.horario == h %}selected{% endif %}>{{ h }}</option>{% endfor %}</select></div>
                <div class="col-span-2"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="activo" {% if alumno.activo %}checked{% endif %} class="w-4 h-4"><span class="text-sm">Alumno activo</span></label></div>
            </div>
            <div class="flex gap-3 mt-4"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Actualizar</button><a href="{{ url_for('alumnos') }}" class="btn btn-outline">Cancelar</a></div>
        </form>
    </div>
</div>
{% endblock %}
