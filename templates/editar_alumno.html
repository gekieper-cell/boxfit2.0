{% extends "base.html" %}
{% block title %}Editar Alumno{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-3xl font-bold text-gray-800">Editar Alumno</h2>
    <p class="text-gray-600">Modificar datos del alumno</p>
</div>

<div class="bg-white rounded-xl shadow-lg p-6 max-w-2xl">
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 mb-2">Nombre completo *</label>
                <input type="text" name="nombre" value="{{ alumno.nombre }}" required class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">DNI *</label>
                <input type="text" name="dni" value="{{ alumno.dni }}" required class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Teléfono</label>
                <input type="text" name="telefono" value="{{ alumno.telefono or '' }}" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" name="email" value="{{ alumno.email or '' }}" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Clase</label>
                <select name="clase" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="">Seleccionar</option>
                    <option value="Boxeo Principiantes" {% if alumno.clase == 'Boxeo Principiantes' %}selected{% endif %}>Boxeo Principiantes</option>
                    <option value="Boxeo Intermedio" {% if alumno.clase == 'Boxeo Intermedio' %}selected{% endif %}>Boxeo Intermedio</option>
                    <option value="Boxeo Avanzado" {% if alumno.clase == 'Boxeo Avanzado' %}selected{% endif %}>Boxeo Avanzado</option>
                    <option value="Funcional" {% if alumno.clase == 'Funcional' %}selected{% endif %}>Funcional</option>
                    <option value="Sparring" {% if alumno.clase == 'Sparring' %}selected{% endif %}>Sparring</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Horario</label>
                <select name="horario" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="">Seleccionar</option>
                    <option value="08:00-09:00" {% if alumno.horario == '08:00-09:00' %}selected{% endif %}>08:00 - 09:00</option>
                    <option value="09:00-10:00" {% if alumno.horario == '09:00-10:00' %}selected{% endif %}>09:00 - 10:00</option>
                    <option value="10:00-11:00" {% if alumno.horario == '10:00-11:00' %}selected{% endif %}>10:00 - 11:00</option>
                    <option value="17:00-18:00" {% if alumno.horario == '17:00-18:00' %}selected{% endif %}>17:00 - 18:00</option>
                    <option value="18:00-19:00" {% if alumno.horario == '18:00-19:00' %}selected{% endif %}>18:00 - 19:00</option>
                    <option value="19:00-20:00" {% if alumno.horario == '19:00-20:00' %}selected{% endif %}>19:00 - 20:00</option>
                    <option value="20:00-21:00" {% if alumno.horario == '20:00-21:00' %}selected{% endif %}>20:00 - 21:00</option>
                </select>
            </div>
            <div class="col-span-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="activo" {% if alumno.activo %}checked{% endif %} class="w-5 h-5">
                    <span class="text-gray-700">Alumno activo</span>
                </label>
            </div>
        </div>
        
        <div class="mt-6 flex gap-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
                <i class="fas fa-save mr-2"></i> Actualizar
            </button>
            <a href="{{ url_for('alumnos') }}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
