{% extends "base.html" %}
{% block title %}Nuevo Alumno{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-3xl font-bold text-gray-800">Nuevo Alumno</h2>
    <p class="text-gray-600">Registrar un nuevo alumno en el sistema</p>
</div>

<div class="bg-white rounded-xl shadow-lg p-6 max-w-2xl">
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 mb-2">Nombre completo *</label>
                <input type="text" name="nombre" required class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">DNI *</label>
                <input type="text" name="dni" required class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Teléfono</label>
                <input type="text" name="telefono" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" name="email" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Clase</label>
                <select name="clase" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="">Seleccionar</option>
                    <option value="Boxeo Principiantes">Boxeo Principiantes</option>
                    <option value="Boxeo Intermedio">Boxeo Intermedio</option>
                    <option value="Boxeo Avanzado">Boxeo Avanzado</option>
                    <option value="Funcional">Funcional</option>
                    <option value="Sparring">Sparring</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-700 mb-2">Horario</label>
                <select name="horario" class="w-full p-3 border border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none">
                    <option value="">Seleccionar</option>
                    <option value="08:00-09:00">08:00 - 09:00</option>
                    <option value="09:00-10:00">09:00 - 10:00</option>
                    <option value="10:00-11:00">10:00 - 11:00</option>
                    <option value="17:00-18:00">17:00 - 18:00</option>
                    <option value="18:00-19:00">18:00 - 19:00</option>
                    <option value="19:00-20:00">19:00 - 20:00</option>
                    <option value="20:00-21:00">20:00 - 21:00</option>
                </select>
            </div>
        </div>
        
        <div class="mt-6 flex gap-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
                <i class="fas fa-save mr-2"></i> Guardar Alumno
            </button>
            <a href="{{ url_for('alumnos') }}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-3 rounded-lg transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
