{% extends "base.html" %}
{% block title %}Nuevo Alumno — Box Gym{% endblock %}

{% block content %}
<a href="{{ url_for('alumnos') }}" class="back-link">
    <i class="fas fa-arrow-left"></i> Volver a Alumnos
</a>

<div class="page-header">
    <h2>Nuevo Alumno</h2>
    <p>Completá los datos para registrar un nuevo alumno.</p>
</div>

<div style="max-width: 600px;">
    <div class="card">
        <form method="POST">
            <div class="grid-2">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Nombre completo *</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Últimos 3 dígitos del DNI *</label>
                    <input type="text" name="dni_fin" class="form-control"
                           placeholder="094"
                           maxlength="3"
                           pattern="[0-9]{3}"
                           title="Exactamente 3 dígitos numéricos"
                           style="font-size: 22px; text-align: center; letter-spacing: 4px; font-weight: 700;"
                           required>
                    <small style="color: var(--text-muted); font-size: 12px;">Se usa para el control de ingreso rápido</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="ejemplo@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Tipo de clase</label>
                    <select name="clase" class="form-control">
                        <option value="">— Sin asignar —</option>
                        <option>Boxeo</option>
                        <option>Funcional</option>
                        <option>Personalizado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Estado de pago</label>
                    <div class="checkbox-group">
                        <input type="checkbox" name="deuda" id="deuda">
                        <label for="deuda">Marcar como deudor (tiene deuda pendiente)</label>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div style="display: flex; gap: 12px;">
                <a href="{{ url_for('alumnos') }}" class="btn btn-outline">
                    <i class="fas fa-times"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Guardar Alumno
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
