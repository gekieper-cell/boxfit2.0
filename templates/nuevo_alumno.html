{% extends "base.html" %}
{% block title %}Nuevo Alumno{% endblock %}

{% block content %}
<div class="mb-5"><h2 class="text-xl font-semibold dark:text-white">Nuevo Alumno</h2><p class="text-gray-500 text-sm">Registrar un nuevo alumno</p></div>

<div class="card max-w-2xl">
    <div class="card-body">
        <form method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group"><label class="form-label">Nombre completo *</label><input type="text" name="nombre" required class="form-control"></div>
                <div class="form-group"><label class="form-label">DNI *</label><input type="text" name="dni" required class="form-control"></div>
                <div class="form-group"><label class="form-label">Teléfono</label><input type="text" name="telefono" class="form-control" placeholder="Ej: 5491112345678"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
                <div class="form-group"><label class="form-label">Clase</label><select name="clase" class="form-control"><option value="">Seleccionar</option><option>Boxeo Principiantes</option><option>Boxeo Intermedio</option><option>Boxeo Avanzado</option><option>Funcional</option><option>Sparring</option></select></div>
                <div class="form-group"><label class="form-label">Horario</label><select name="horario" class="form-control"><option value="">Seleccionar</option><option>08:00-09:00</option><option>09:00-10:00</option><option>10:00-11:00</option><option>17:00-18:00</option><option>18:00-19:00</option><option>19:00-20:00</option><option>20:00-21:00</option></select></div>
            </div>
            <div class="flex gap-3 mt-4"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Alumno</button><a href="{{ url_for('alumnos') }}" class="btn btn-outline">Cancelar</a></div>
        </form>
    </div>
</div>
{% endblock %}
