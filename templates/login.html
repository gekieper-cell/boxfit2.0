<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxFit Gym - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp {
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo-animate {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md animate-fadeInUp border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-red-500 to-red-600 w-24 h-24 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl logo-animate">
                <i class="fas fa-dumbbell text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-white">BoxFit Gym</h1>
            <p class="text-gray-300 mt-2">Sistema de Gestión</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-4 rounded-xl {% if category == 'success' %}bg-green-500/20 border border-green-500 text-green-200{% elif category == 'error' %}bg-red-500/20 border border-red-500 text-red-200{% else %}bg-blue-500/20 border border-blue-500 text-blue-200{% endif %}">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'error' %}exclamation-circle{% else %}info-circle{% endif %} mr-2"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2 text-sm font-medium">
                    <i class="fas fa-user mr-2"></i>Usuario
                </label>
                <input type="text" name="username" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all" placeholder="Ingresa tu usuario" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm font-medium">
                    <i class="fas fa-lock mr-2"></i>Contraseña
                </label>
                <input type="password" name="password" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-xl transform hover:scale-[1.02] flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                Ingresar
            </button>
        </form>
        
        <div class="mt-6 text-center text-gray-400 text-xs">
            <p>Sistema de Gestión para Gimnasios</p>
            <p class="mt-1">© 2024 BoxFit Gym</p>
        </div>
    </div>
</body>
</html>
