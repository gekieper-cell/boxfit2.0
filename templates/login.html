<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxFit Gym - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-red-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-dumbbell text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">BoxFit Gym</h1>
            <p class="text-gray-400 mt-2">Sistema de Gestión</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 rounded-lg {% if category == 'success' %}bg-green-800 text-green-200{% elif category == 'error' %}bg-red-800 text-red-200{% else %}bg-blue-800 text-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2">Usuario</label>
                <input type="text" name="username" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-red-500 focus:outline-none" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2">Contraseña</label>
                <input type="password" name="password" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-red-500 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Ingresar
            </button>
        </form>
    </div>
</body>
</html>
