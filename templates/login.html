<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gym Login - Box & Funcional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-96 border border-gray-700">
        <h2 class="text-3xl font-bold text-red-500 text-center mb-2 uppercase">Box Gym</h2>
        <p class="text-gray-400 text-center mb-8 text-sm italic">Gestión de Alumnos y Ventas</p>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-gray-400 text-sm mb-2">Usuario</label>
                <input type="text" name="username" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-red-500">
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-2">Contraseña</label>
                <input type="password" name="password" required class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-red-500">
            </div>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg transition duration-300 uppercase tracking-wider">
                Entrar
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="#" class="text-gray-500 text-xs hover:text-red-400">¿Olvidaste tu clave de administrador?</a>
        </div>
    </div>
</body>
</html>
